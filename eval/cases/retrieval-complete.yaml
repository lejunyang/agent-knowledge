documents:
  - id: k_eval_vue_lint
    title: Vue SFC lint fallback
    type: semantic
    domain: frontend/vue-lint
    scenarios: [lint-migration]
    aliases: [vue-lint, sfc fallback]
    tags: [vue, eslint, oxlint]
    body: Oxlint checks JavaScript and TypeScript, while Vue SFC template rules still require an ESLint fallback.

  - id: k_eval_react_lint
    title: React lint fast path
    type: semantic
    domain: frontend/react-lint
    scenarios: [lint-migration]
    aliases: [react-lint]
    tags: [react, eslint, oxlint]
    body: React TSX can use the Oxlint fast path without the Vue template fallback.

  - id: k_eval_mysql_migration
    title: MySQL online schema migration
    type: procedural
    domain: data/mysql-migration
    scenarios: [schema-migration]
    aliases: [online ddl, mysql ddl]
    tags: [mysql, database]
    body: Large MySQL tables require an online DDL plan, replica lag monitoring, and a rollback checkpoint.

  - id: k_eval_redis_migration
    title: Redis key migration
    type: procedural
    domain: data/redis-migration
    scenarios: [schema-migration]
    aliases: [redis migration]
    tags: [redis, cache]
    body: Redis migration uses dual read and dual write before switching key prefixes.

  - id: k_eval_refund_approval
    title: Refund approval boundary
    type: semantic
    domain: support/refund-approval
    scenarios: [customer-support]
    aliases: [refund review]
    tags: [refund, approval]
    body: High-value refunds require an authorized reviewer and cannot be approved from a customer statement alone.

  - id: k_eval_refund_status
    title: Refund status explanation
    type: semantic
    domain: support/refund-status
    scenarios: [customer-support]
    aliases: [refund progress]
    tags: [refund, status]
    body: Refund status answers explain processing, completed, or rejected states without changing approval rules.

  - id: k_eval_oauth_rotation
    title: OAuth client secret rotation
    type: procedural
    domain: security/oauth-rotation
    scenarios: [credential-rotation]
    aliases: [oauth rotation]
    tags: [oauth, credential]
    body: Rotate an OAuth client secret with overlap, verify the new credential, then revoke the old credential.

  - id: k_eval_oauth_login
    title: OAuth login troubleshooting
    type: procedural
    domain: security/oauth-login
    scenarios: [credential-rotation]
    aliases: [oauth login]
    tags: [oauth, login]
    body: OAuth login troubleshooting checks redirect URI and consent scopes; it does not rotate client secrets.

  - id: k_eval_webdav_conflict
    title: WebDAV three-way conflict
    type: semantic
    domain: sync/webdav-conflict
    scenarios: [knowledge-sync]
    aliases: [webdav conflict]
    tags: [webdav, conflict]
    body: Concurrent local and WebDAV edits produce a conflict artifact instead of last-write-wins replacement.

  - id: k_eval_s3_path_style
    title: S3-compatible path style
    type: semantic
    domain: sync/s3-path-style
    scenarios: [knowledge-sync]
    aliases: [minio path style]
    tags: [s3, minio]
    body: MinIO and some S3-compatible endpoints require force-path-style bucket addressing.

  - id: k_eval_git_identity
    title: Git project identity
    type: semantic
    domain: project/git-identity
    scenarios: [project-detection]
    aliases: [project id]
    tags: [git, remote]
    body: Project identity prefers a normalized Git remote and falls back to the canonical Git root path.

  - id: k_eval_agents_inventory
    title: AGENTS inventory fingerprint
    type: semantic
    domain: project/agents-inventory
    scenarios: [project-detection]
    aliases: [agents hash]
    tags: [agents, hash]
    body: The project registry records AGENTS file paths and hashes without copying instruction contents.

  - id: k_eval_hook_relevance
    title: Quiet hook relevance gate
    type: procedural
    domain: agent/hook-relevance
    scenarios: [hook-injection]
    aliases: [quiet hook]
    tags: [hook, context]
    body: UserPromptSubmit stays silent for no hit or weak hit and injects only a minimal context packet for reliable matches.

  - id: k_eval_hook_lifecycle
    title: Hook lifecycle staging
    type: procedural
    domain: agent/hook-lifecycle
    scenarios: [hook-injection]
    aliases: [hook staging]
    tags: [hook, staging]
    body: SubagentStart, SubagentStop, Stop, and SessionEnd append redacted lifecycle staging events.

  - id: k_eval_embedding_cache
    title: Embedding cache compatibility
    type: semantic
    domain: retrieval/embedding-cache
    scenarios: [hybrid-retrieval]
    aliases: [embedding manifest]
    tags: [embedding, cache]
    body: Query verifies model, dimensions, pooling, prefix, and normalization against the embedding manifest.

  - id: k_eval_rerank_threshold
    title: Rerank injection threshold
    type: semantic
    domain: retrieval/rerank-threshold
    scenarios: [hybrid-retrieval]
    aliases: [injection threshold]
    tags: [rerank, threshold]
    body: A rerank threshold suppresses weak candidates before the final top results are injected.

  - id: k_eval_temporal_current
    title: Current account review policy
    type: semantic
    domain: business/account-review
    scenarios: [temporal-update]
    aliases: [current review policy]
    tags: [account, review]
    body: Since July 2026, account changes require one authorized review.
    valid_from: 2026-07-01

  - id: k_eval_temporal_old
    title: Deprecated account review policy
    type: semantic
    domain: business/account-review-legacy
    scenarios: [temporal-update]
    aliases: [old review policy]
    tags: [account, review]
    body: Before July 2026, account changes required two reviews.
    status: deprecated
    valid_from: 2026-01-01
    valid_until: 2026-06-30

